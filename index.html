<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOMB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070f;
    --panel: #10101e;
    --accent-red: #ff2d55;
    --accent-cyan: #00e5ff;
    --accent-gold: #ffd700;
    --accent-green: #39ff14;
    --text: #c8d0e0;
    --dim: #4a5060;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
    cursor: none;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 28px;
    pointer-events: none;
    z-index: 10;
  }

  .hud-box {
    background: linear-gradient(135deg, rgba(16,16,30,0.9), rgba(10,10,20,0.8));
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    padding: 10px 20px;
    backdrop-filter: blur(6px);
  }

  .hud-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--accent-gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  .hud-value.cyan { color: var(--accent-cyan); text-shadow: 0 0 20px rgba(0,229,255,0.5); }
  .hud-value.red  { color: var(--accent-red);  text-shadow: 0 0 20px rgba(255,45,85,0.5); }

  /* combo badge */
  #combo-display {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent-green);
    text-shadow: 0 0 30px var(--accent-green);
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 4px;
  }

  /* ammo bar */
  #ammo-bar {
    position: absolute;
    bottom: 28px;
    right: 32px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
    pointer-events: none;
    z-index: 10;
  }

  .bullet-icon {
    width: 8px;
    height: 22px;
    border-radius: 4px 4px 2px 2px;
    background: var(--accent-cyan);
    box-shadow: 0 0 8px var(--accent-cyan);
    transition: all 0.15s;
  }
  .bullet-icon.spent {
    background: #1a2030;
    box-shadow: none;
  }

  /* reload button */
  #reload-btn {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 40px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--bg);
    background: var(--accent-cyan);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    z-index: 20;
    display: none;
    box-shadow: 0 0 30px rgba(0,229,255,0.6);
    animation: pulse-btn 0.8s ease-in-out infinite alternate;
  }
  #reload-btn:hover { background: #fff; }
  @keyframes pulse-btn {
    from { box-shadow: 0 0 20px rgba(0,229,255,0.5); }
    to   { box-shadow: 0 0 50px rgba(0,229,255,0.9); }
  }

  /* overlay screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(7,7,15,0.92);
    z-index: 30;
    backdrop-filter: blur(8px);
  }

  .screen-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .screen-sub {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--dim);
    margin-bottom: 52px;
  }

  .screen-btn {
    padding: 16px 52px;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--bg);
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-red));
    border: none;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 30px rgba(0,229,255,0.4);
  }
  .screen-btn:hover { transform: scale(1.04); box-shadow: 0 0 50px rgba(0,229,255,0.7); }

  .instructions {
    color: var(--text);
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 36px;
    text-align: center;
    line-height: 2;
    opacity: 0.7;
  }

  .score-final {
    font-family: 'Orbitron', monospace;
    font-size: 52px;
    font-weight: 900;
    color: var(--accent-gold);
    text-shadow: 0 0 40px rgba(255,215,0,0.6);
    margin-bottom: 4px;
  }
  .score-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--dim);
    margin-bottom: 40px;
  }

  /* scanline fx */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-display">0</div>
  </div>
  <div class="hud-box" style="text-align:center;">
    <div class="hud-label">Time</div>
    <div class="hud-value cyan" id="time-display">60</div>
  </div>
  <div class="hud-box" style="text-align:right;">
    <div class="hud-label">Hits / Shots</div>
    <div class="hud-value red" id="acc-display">0 / 0</div>
  </div>
</div>

<div id="combo-display">COMBO ×1</div>

<div id="ammo-bar"></div>
<button id="reload-btn">↺ RELOAD</button>

<!-- Game Canvas -->
<canvas id="canvas"></canvas>

<!-- Start Screen -->
<div class="screen" id="start-screen">
  <div class="screen-title">BOMB</div>
  <div class="screen-sub">S H O O T I N G</div>
  <p class="instructions">
    移動滑鼠瞄準 · 左鍵射擊 · 右鍵換彈<br>
    靶從四方飛出，打中得分<br>
    靶心命中有額外獎勵
  </p>
  <button class="screen-btn" id="start-btn">開始遊戲</button>
</div>

<!-- Game Over Screen -->
<div class="screen" id="gameover-screen" style="display:none;">
  <div class="screen-title">BOMB</div>
  <div class="score-final" id="final-score">0</div>
  <div class="score-label">FINAL SCORE</div>
  <div class="score-final" id="final-acc" style="font-size:28px; color:var(--accent-cyan); text-shadow:0 0 20px rgba(0,229,255,0.5);">--</div>
  <div class="score-label" style="margin-bottom:44px;">ACCURACY</div>
  <button class="screen-btn" id="restart-btn">再來一局</button>
</div>

<script>
// ─── Setup ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── State ────────────────────────────────────────────────────────────────────
const MAX_AMMO     = 6;
const GAME_DURATION = 60;

let gameActive = false;
let score      = 0;
let timeLeft   = GAME_DURATION;
let shots      = 0;
let hits       = 0;
let combo      = 0;
let ammo       = MAX_AMMO;
let reloading  = false;

let targets    = [];
let particles  = [];
let flashes    = [];
let hitTexts   = [];
let shakeX     = 0, shakeY = 0, shakeMag = 0;

let mouseX = -200, mouseY = -200;
let crosshairX = -200, crosshairY = -200; // smoothed

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const scoreDisplay  = document.getElementById('score-display');
const timeDisplay   = document.getElementById('time-display');
const accDisplay    = document.getElementById('acc-display');
const comboDisplay  = document.getElementById('combo-display');
const ammoBar       = document.getElementById('ammo-bar');
const reloadBtn     = document.getElementById('reload-btn');
const startScreen   = document.getElementById('start-screen');
const gameoverScreen= document.getElementById('gameover-screen');
const finalScore    = document.getElementById('final-score');
const finalAcc      = document.getElementById('final-acc');

// ─── Ammo UI ──────────────────────────────────────────────────────────────────
function buildAmmoBar() {
  ammoBar.innerHTML = '';
  for (let i = 0; i < MAX_AMMO; i++) {
    const b = document.createElement('div');
    b.className = 'bullet-icon' + (i >= ammo ? ' spent' : '');
    ammoBar.appendChild(b);
  }
}

// ─── Target factory ──────────────────────────────────────────────────────────
function spawnTarget() {
  const side    = Math.random() < 0.5 ? 'h' : 'v';
  let x, y, vx, vy;
  const speed   = 80 + Math.random() * 120 + (GAME_DURATION - timeLeft) * 1.2;
  const r       = 28 + Math.random() * 22;
  const rings   = Math.floor(Math.random() * 2) + 3; // 3-4 rings
  const hue     = [0, 180, 210, 45][Math.floor(Math.random() * 4)];
  const wobble  = (Math.random() - 0.5) * 0.6; // angular wobble speed

  if (side === 'h') {
    x  = Math.random() < 0.5 ? -r - 10 : W + r + 10;
    y  = H * 0.15 + Math.random() * H * 0.7;
    vx = x < 0 ? speed : -speed;
    vy = (Math.random() - 0.5) * speed * 0.5;
  } else {
    y  = Math.random() < 0.5 ? -r - 10 : H + r + 10;
    x  = W * 0.15 + Math.random() * W * 0.7;
    vy = y < 0 ? speed : -speed;
    vx = (Math.random() - 0.5) * speed * 0.5;
  }

  targets.push({ x, y, vx, vy, r, rings, hue, wobble, angle: 0, alive: true });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function explode(x, y, hue, isHeadshot) {
  const count = isHeadshot ? 36 : 20;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const speed = isHeadshot ? 160 + Math.random() * 200 : 80 + Math.random() * 140;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      r: isHeadshot ? 3 + Math.random() * 4 : 2 + Math.random() * 3,
      hue: hue + (Math.random() - 0.5) * 30,
      sat: isHeadshot ? 100 : 80,
    });
  }
  // Debris shards
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      r: 5 + Math.random() * 8,
      hue: hue,
      sat: 30,
      shard: true,
    });
  }
}

// ─── Hit text popup ───────────────────────────────────────────────────────────
function spawnHitText(x, y, text, color) {
  hitTexts.push({ x, y, vy: -60, text, color, life: 1, decay: 0.022 });
}

// ─── Screen flash ─────────────────────────────────────────────────────────────
function flash(color, alpha) {
  flashes.push({ color, alpha, decay: alpha * 0.08 });
}

// ─── Screen shake ────────────────────────────────────────────────────────────
function shake(mag) { shakeMag = Math.max(shakeMag, mag); }

// ─── Shooting ────────────────────────────────────────────────────────────────
function shoot() {
  if (!gameActive || reloading || ammo <= 0) return;
  ammo--;
  shots++;
  buildAmmoBar();
  shake(5);

  const cx = crosshairX, cy = crosshairY;

  let hit = false;
  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    if (!t.alive) continue;
    const dist = Math.hypot(cx - t.x, cy - t.y);
    if (dist <= t.r) {
      t.alive = false;
      hit = true;
      hits++;

      // Score scales with how close to center (smaller = higher score)
      // dist=0 → 500pts, dist=r → 10pts, smooth curve
      const normDist = dist / t.r; // 0.0 (center) ~ 1.0 (edge)
      const basePts  = Math.round(10 + (500 - 10) * Math.pow(1 - normDist, 2.2));

      const isHeadshot = normDist <= 0.15;
      const isCenter   = normDist <= 0.4;
      combo++;

      const comboMult = Math.min(combo, 6);
      let pts = basePts * comboMult;

      let label, labelColor;
      if (isHeadshot) {
        label      = `BULLSEYE! +${pts}`;
        labelColor = '#ffd700';
        flash('#ffd700', 0.18);
        shake(14);
      } else if (isCenter) {
        label      = `NICE! +${pts}`;
        labelColor = '#00e5ff';
        flash('#00e5ff', 0.1);
        shake(9);
      } else {
        label      = `+${pts}`;
        labelColor = '#c8d0e0';
        shake(6);
      }
      spawnHitText(cx, cy - 30, label, labelColor);

      score += pts;
      explode(t.x, t.y, t.hue, isHeadshot);
      updateHUD();
      if (combo >= 3) showCombo();
      break;
    }
  }

  if (!hit) {
    combo = 0;
    comboDisplay.style.opacity = '0';
  }

  if (ammo === 0) triggerReload();
}

function triggerReload() {
  if (reloading) return;
  reloading = true;
  reloadBtn.style.display = 'block';
}

function doReload() {
  if (!reloading) return;
  ammo      = MAX_AMMO;
  reloading = false;
  reloadBtn.style.display = 'none';
  buildAmmoBar();
}

function showCombo() {
  comboDisplay.textContent = `COMBO ×${combo}`;
  comboDisplay.style.opacity = '1';
}

function updateHUD() {
  scoreDisplay.textContent = score.toLocaleString();
  const acc = shots > 0 ? Math.round((hits / shots) * 100) : 0;
  accDisplay.textContent = `${hits} / ${shots}`;
}

// ─── Game loop ────────────────────────────────────────────────────────────────
let lastTime  = 0;
let spawnTimer = 0;
let timerAcc   = 0;

function getSpawnInterval() {
  // gets faster as time runs out
  const progress = (GAME_DURATION - timeLeft) / GAME_DURATION;
  return Math.max(0.45, 1.4 - progress * 0.9);
}

function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Timer
  timerAcc += dt;
  if (timerAcc >= 1) {
    timerAcc -= 1;
    timeLeft = Math.max(0, timeLeft - 1);
    timeDisplay.textContent = timeLeft;
    if (timeLeft === 0) { endGame(); return; }
  }

  // Spawn
  spawnTimer += dt;
  if (spawnTimer >= getSpawnInterval()) {
    spawnTimer = 0;
    spawnTarget();
    // Occasionally double-spawn in late game
    if (timeLeft < 30 && Math.random() < 0.35) spawnTarget();
  }

  // Screen shake decay
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.72;
  } else { shakeX = shakeY = shakeMag = 0; }

  // Smooth crosshair
  crosshairX += (mouseX - crosshairX) * 0.35;
  crosshairY += (mouseY - crosshairY) * 0.35;

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 220 * dt; // gravity
    p.vx *= 0.97;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Update hit texts
  hitTexts = hitTexts.filter(h => {
    h.y += h.vy * dt;
    h.life -= h.decay;
    return h.life > 0;
  });

  // Update flashes
  flashes = flashes.filter(f => { f.alpha -= f.decay; return f.alpha > 0; });

  // Update targets
  targets = targets.filter(t => {
    if (!t.alive) return false;
    t.x += t.vx * dt;
    t.y += t.vy * dt;
    t.angle += t.wobble * dt;
    const margin = t.r + 60;
    return !(t.x < -margin || t.x > W + margin || t.y < -margin || t.y > H + margin);
  });

  draw();
  requestAnimationFrame(loop);
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
function drawTarget(t) {
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.rotate(t.angle);

  // Outer glow
  const grd = ctx.createRadialGradient(0, 0, t.r * 0.6, 0, 0, t.r * 1.5);
  grd.addColorStop(0, `hsla(${t.hue},80%,60%,0.15)`);
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(0, 0, t.r * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Rings
  for (let i = t.rings; i >= 0; i--) {
    const ratio = i / t.rings;
    const rr    = t.r * (0.12 + 0.88 * ratio);

    // Alternating fill
    if (i % 2 === 0) {
      ctx.beginPath();
      ctx.arc(0, 0, rr, 0, Math.PI * 2);
      ctx.fillStyle = i === 0
        ? `hsl(${t.hue + 15},100%,65%)`
        : `hsl(${t.hue},60%,${12 + i * 4}%)`;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, rr, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${t.hue},80%,85%)`;
      ctx.fill();
    }

    // Ring stroke
    ctx.beginPath();
    ctx.arc(0, 0, rr, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${t.hue},90%,70%,0.5)`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
  }

  // Bullseye dot
  ctx.beginPath();
  ctx.arc(0, 0, t.r * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Crosshair lines on target
  ctx.strokeStyle = `hsla(${t.hue + 180},80%,70%,0.3)`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-t.r, 0); ctx.lineTo(t.r, 0);
  ctx.moveTo(0, -t.r); ctx.lineTo(0, t.r);
  ctx.stroke();

  ctx.restore();
}

function drawCrosshair(x, y) {
  const size = 18, gap = 6, thick = 1.5;
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.004);
  const col   = `rgba(0,229,255,${pulse})`;

  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = thick;
  ctx.shadowBlur  = 10;
  ctx.shadowColor = '#00e5ff';

  // Four arms
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(x + dx * gap, y + dy * gap);
    ctx.lineTo(x + dx * (gap + size), y + dy * (gap + size));
    ctx.stroke();
  });

  // Center dot
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.shadowBlur = 14;
  ctx.fill();

  // Outer circle (subtle)
  ctx.beginPath();
  ctx.arc(x, y, gap + size + 4, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(0,229,255,${pulse * 0.2})`;
  ctx.lineWidth = 0.8;
  ctx.shadowBlur = 0;
  ctx.stroke();

  ctx.restore();
}

function drawBg() {
  // Deep space bg
  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,229,255,0.04)';
  ctx.lineWidth = 1;
  const gs = 60;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBg();

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    if (p.shard) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},${p.sat}%,60%,0.8)`;
      ctx.fill();
    } else {
      ctx.shadowBlur  = 12;
      ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${p.hue},${p.sat}%,70%)`;
      ctx.fill();
    }
    ctx.restore();
  });

  // Targets
  targets.forEach(t => drawTarget(t));

  // Hit texts
  hitTexts.forEach(h => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, h.life * 2);
    ctx.font        = `bold ${Math.round(14 + (1 - h.life) * 8)}px 'Orbitron', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = h.color;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = h.color;
    ctx.fillText(h.text, h.x, h.y);
    ctx.restore();
  });

  // Crosshair
  drawCrosshair(crosshairX, crosshairY);

  // Screen flashes
  flashes.forEach(f => {
    ctx.save();
    ctx.globalAlpha = f.alpha;
    ctx.fillStyle   = f.color;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  });

  ctx.restore();
}

// ─── Game control ─────────────────────────────────────────────────────────────
function startGame() {
  score = 0; timeLeft = GAME_DURATION; shots = 0; hits = 0;
  combo = 0; ammo = MAX_AMMO; reloading = false;
  targets = []; particles = []; flashes = []; hitTexts = [];
  spawnTimer = 0; timerAcc = 0; shakeMag = 0;

  startScreen.style.display   = 'none';
  gameoverScreen.style.display = 'none';
  reloadBtn.style.display      = 'none';
  comboDisplay.style.opacity   = '0';

  buildAmmoBar();
  updateHUD();
  timeDisplay.textContent = timeLeft;
  scoreDisplay.textContent = '0';

  gameActive = true;
  lastTime   = performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  gameActive = false;
  const acc = shots > 0 ? Math.round((hits / shots) * 100) : 0;
  finalScore.textContent = score.toLocaleString();
  finalAcc.textContent   = `${acc}% 命中率`;
  gameoverScreen.style.display = 'flex';
  reloadBtn.style.display = 'none';
}

// ─── Events ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('click', e => {
  if (!gameActive) return;
  shoot();
});

reloadBtn.addEventListener('click', doReload);

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Right-click to reload
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (gameActive) doReload();
});

// Initial crosshair position
crosshairX = window.innerWidth / 2;
crosshairY = window.innerHeight / 2;
mouseX = crosshairX;
mouseY = crosshairY;

// Draw idle frame
(function idleLoop(ts) {
  if (gameActive) return;
  lastTime = ts;
  crosshairX += (mouseX - crosshairX) * 0.2;
  crosshairY += (mouseY - crosshairY) * 0.2;
  drawBg();
  drawCrosshair(crosshairX, crosshairY);
  requestAnimationFrame(idleLoop);
})(0);
</script>
